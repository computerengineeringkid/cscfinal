<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <!-- Connecting lines -->
  <g stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 175 300 L 305 300"/>
    <path d="M 455 300 L 585 300"/>
    <path d="M 735 300 Q 800 300 800 200 L 870 200"/>
    <path d="M 735 300 Q 800 300 800 300 L 870 300"/>
    <path d="M 735 300 Q 800 300 800 400 L 870 400"/>
    <path d="M 1020 200 L 1080 200"/>
    <path d="M 1020 300 L 1080 300"/>
    <path d="M 1020 400 L 1080 400"/>
  </g>

  <!-- Node: Gmail Trigger -->
  <g>
    <rect x="40" y="260" width="135" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="70" cy="295" r="14" fill="#ef4444"/>
    <text x="90" y="290" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">Gmail</text>
    <text x="90" y="308" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Trigger</text>
  </g>

  <!-- Node: AI Classifier -->
  <g>
    <rect x="305" y="260" width="150" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(99,102,241,0.4)"/>
    <circle cx="335" cy="295" r="14" fill="url(#grad)"/>
    <text x="355" y="290" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">AI Classifier</text>
    <text x="355" y="308" font-family="Inter, sans-serif" font-size="11" fill="#64748b">LLM Node</text>
  </g>

  <!-- Node: Switch -->
  <g>
    <rect x="585" y="260" width="150" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <circle cx="615" cy="295" r="14" fill="#f59e0b"/>
    <text x="635" y="290" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">Switch</text>
    <text x="635" y="308" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Route by Type</text>
  </g>

  <!-- Branch nodes -->
  <g>
    <rect x="870" y="170" width="150" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(34,197,94,0.4)"/>
    <text x="890" y="195" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">Support</text>
    <text x="890" y="213" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Format Ticket</text>
  </g>
  <g>
    <rect x="870" y="270" width="150" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(99,102,241,0.4)"/>
    <text x="890" y="295" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">Inquiry</text>
    <text x="890" y="313" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Tag &amp; Log</text>
  </g>
  <g>
    <rect x="870" y="370" width="150" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(168,85,247,0.4)"/>
    <text x="890" y="395" font-family="Inter, sans-serif" font-size="13" fill="#f1f5f9" font-weight="600">Transactional</text>
    <text x="890" y="413" font-family="Inter, sans-serif" font-size="11" fill="#64748b">Archive</text>
  </g>

  <!-- Slack endpoints -->
  <g>
    <rect x="1080" y="170" width="100" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <text x="1100" y="205" font-family="Inter, sans-serif" font-size="12" fill="#f1f5f9">Slack #support</text>
  </g>
  <g>
    <rect x="1080" y="270" width="100" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <text x="1100" y="305" font-family="Inter, sans-serif" font-size="12" fill="#f1f5f9">Slack #leads</text>
  </g>
  <g>
    <rect x="1080" y="370" width="100" height="60" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <text x="1100" y="405" font-family="Inter, sans-serif" font-size="12" fill="#f1f5f9">Sheets Log</text>
  </g>

  <!-- Header label -->
  <text x="40" y="50" font-family="JetBrains Mono, monospace" font-size="14" fill="#64748b">strafe-inbox-ai · n8n workflow</text>
  <text x="40" y="80" font-family="Inter, sans-serif" font-size="22" fill="#f1f5f9" font-weight="700">Email Classification &amp; Routing Pipeline</text>
</svg>
